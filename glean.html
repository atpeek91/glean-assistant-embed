<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta
  http-equiv="Content-Security-Policy"
  content="default-src 'self' https://app.glean.com https://*.glean.com;
           script-src 'self' https://app.glean.com 'unsafe-inline';
           style-src 'self' 'unsafe-inline';
           connect-src 'self' https://app.glean.com https://*.glean.com;
           frame-src https://app.glean.com https://*.glean.com;
           img-src 'self' data: https:;">
<title>Glean Assistant</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; }

  #launch-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 16px;
    background: #f3f6fb;
  }

  #launch-btn {
    padding: 13px 28px;
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    background: #1a73e8;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    box-shadow: 0 4px 12px rgba(26,115,232,0.35);
  }
  #launch-btn:hover { opacity: 0.88; }
  #launch-btn:disabled { opacity: 0.55; cursor: default; }

  #launch-label {
    font-size: 13px;
    color: #666;
  }

  #gc {
    display: none;
    position: relative;
    width: 100%;
    height: 100%;
  }

  #err {
    display: none;
    padding: 28px;
    color: #c62828;
    font-size: 14px;
    line-height: 1.8;
  }
</style>
<script defer src="https://app.glean.com/embedded-search-latest.min.js"></script>
</head>
<body>

  <div id="launch-screen">
    <!-- This button provides the user gesture required by the browser's
         Storage Access API so Glean can access your session cookies
         from inside this embedded frame. -->
    <button id="launch-btn" onclick="launch()">Launch Glean Assistant</button>
    <span id="launch-label">Click to connect to your Glean account</span>
  </div>

  <div id="gc"></div>
  <div id="err"></div>

  <script>
    // ── CONFIGURE IF NEEDED ───────────────────────────────────────────────────
    var WEB_APP_URL = "https://app.glean.com";
    var BACKEND_URL = "https://oida-be.glean.com";
    var AGENT_ID    = "";  // Optional: your Glean agent ID
    // ─────────────────────────────────────────────────────────────────────────

    function showErr(msg) {
      document.getElementById('gc').style.display = 'none';
      document.getElementById('launch-screen').style.display = 'none';
      var e = document.getElementById('err');
      e.style.display = 'block';
      e.textContent = msg;
    }

    function renderChat() {
      document.getElementById('launch-screen').style.display = 'none';
      var container = document.getElementById('gc');
      container.style.display = 'block';

      try {
        var opts = {
          webAppUrl: WEB_APP_URL,
          backend:   BACKEND_URL,
          enable3PCookieAccessRequest: true,
          customizations: {
            features: {
              chatMenu: false,
              chatSettings: false,
              createPrompt: false,
              clearChat: true,
              feedback: true,
              applicationLibrary: false,
              promptLibrary: false
            }
          }
        };
        if (AGENT_ID) { opts.agentId = AGENT_ID; }
        window.GleanWebSDK.renderChat(container, opts);
      } catch (e) {
        showErr('Glean SDK error: ' + (e && e.message ? e.message : String(e)));
      }
    }

    function launch() {
      var btn = document.getElementById('launch-btn');
      var lbl = document.getElementById('launch-label');
      btn.disabled = true;
      lbl.textContent = 'Connecting…';

      // Request storage access first (user gesture satisfies browser requirement),
      // then render the Glean chat regardless of whether access was granted —
      // Glean's own enable3PCookieAccessRequest handles the auth flow from there.
      var accessReq = document.requestStorageAccess
        ? document.requestStorageAccess()
        : Promise.resolve();

      accessReq
        .catch(function () { /* storage access denied — try anyway */ })
        .finally(function () {
          if (window.GleanWebSDK) {
            renderChat();
          } else {
            lbl.textContent = 'Waiting for Glean SDK…';
            var timeout = setTimeout(function () {
              showErr('Glean SDK did not load within 10 s. Check network access to https://app.glean.com.');
            }, 10000);
            window.addEventListener('glean:ready', function () {
              clearTimeout(timeout);
              renderChat();
            }, { once: true });
          }
        });
    }
  </script>
</body>
</html>
