<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta
  http-equiv="Content-Security-Policy"
  content="default-src 'self' https://app.glean.com https://*.glean.com;
           script-src 'self' https://app.glean.com 'unsafe-inline';
           style-src 'self' 'unsafe-inline';
           connect-src 'self' https://app.glean.com https://*.glean.com;
           frame-src https://app.glean.com https://*.glean.com;
           img-src 'self' data: https:;">
<title>Glean Assistant</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #fff; }
  #gc {
    position: relative;
    display: block;
    width: 100%;
    height: 100%;
  }
  #err {
    display: none;
    padding: 28px;
    color: #c62828;
    font-family: 'Segoe UI', sans-serif;
    font-size: 14px;
    line-height: 1.8;
  }
</style>
<script defer src="https://app.glean.com/embedded-search-latest.min.js"></script>
</head>
<body>
  <div id="gc"></div>
  <div id="err"></div>
  <script>
    (function () {
      // ── CONFIGURE IF NEEDED ─────────────────────────────────────────────────
      var WEB_APP_URL = "https://app.glean.com";
      var BACKEND_URL = "https://oida-be.glean.com";
      var AGENT_ID    = "";   // Optional: set your Glean agent ID here
      // ────────────────────────────────────────────────────────────────────────

      function showErr(msg) {
        document.getElementById('gc').style.display = 'none';
        var e = document.getElementById('err');
        e.style.display = 'block';
        e.textContent = msg;
      }

      function render() {
        try {
          var container = document.getElementById('gc');
          var opts = {
            webAppUrl: WEB_APP_URL,
            backend:   BACKEND_URL,
            enable3PCookieAccessRequest: true,
            customizations: {
              features: {
                chatMenu: false,
                chatSettings: false,
                createPrompt: false,
                clearChat: true,
                feedback: true,
                applicationLibrary: false,
                promptLibrary: false
              }
            }
          };
          if (AGENT_ID) { opts.agentId = AGENT_ID; }
          window.GleanWebSDK.renderChat(container, opts);
        } catch (e) {
          showErr('Glean SDK error: ' + (e && e.message ? e.message : String(e)));
        }
      }

      if (window.GleanWebSDK) {
        render();
      } else {
        var timeout = setTimeout(function () {
          showErr(
            'Glean SDK did not load within 10 seconds.\n' +
            'Check that https://app.glean.com is reachable from your network.'
          );
        }, 10000);

        window.addEventListener('glean:ready', function () {
          clearTimeout(timeout);
          render();
        }, { once: true });
      }
    })();
  </script>
</body>
</html>
