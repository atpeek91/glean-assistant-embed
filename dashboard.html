<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard — Glean Assistant</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; background: #f3f6fb; }

  /* ── Header ── */
  #header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 52px;
    padding: 0 20px;
    background: #1a1f2e;
    color: #fff;
    flex-shrink: 0;
    z-index: 10;
    position: relative;
  }
  #header-title { font-size: 16px; font-weight: 600; letter-spacing: 0.02em; }
  #toggle-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    background: #1a73e8;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
    transition: background 0.15s;
    white-space: nowrap;
  }
  #toggle-btn:hover { background: #1558c0; }
  #toggle-btn svg { flex-shrink: 0; }

  /* ── Body layout ── */
  #layout {
    display: flex;
    width: 100%;
    height: calc(100% - 52px);
    overflow: hidden;
  }

  /* ── Power BI iframe ── */
  #pbi-wrap {
    flex: 1 1 0;
    min-width: 0;
    position: relative;
    transition: flex 0.3s ease;
  }
  #pbi-wrap iframe {
    width: 100%;
    height: 100%;
    border: none;
    display: block;
  }

  /* ── Glean side panel ── */
  #glean-panel {
    flex: 0 0 420px;
    width: 420px;
    display: flex;
    flex-direction: column;
    background: #fff;
    border-left: 1px solid #d8dde6;
    box-shadow: -4px 0 20px rgba(0,0,0,0.12);
    overflow: hidden;
    transition: flex-basis 0.3s ease, width 0.3s ease;
  }
  #glean-panel.collapsed {
    flex-basis: 0;
    width: 0;
    border-left: none;
    box-shadow: none;
  }

  #panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    background: #1a1f2e;
    color: #fff;
    flex-shrink: 0;
  }
  #panel-title { font-size: 14px; font-weight: 600; }

  /* ── Glean container (fills rest of panel) ── */
  #gc {
    flex: 1;
    min-height: 0;
    overflow: hidden;
    position: relative;
  }

  /* ── Launch screen inside panel ── */
  #launch-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    gap: 16px;
    background: #f3f6fb;
    padding: 24px;
    text-align: center;
  }
  #launch-screen p {
    font-size: 13px;
    color: #555;
    line-height: 1.6;
    max-width: 280px;
  }
  #launch-btn {
    padding: 12px 24px;
    font-size: 14px;
    font-weight: 600;
    color: #fff;
    background: #1a73e8;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    box-shadow: 0 4px 12px rgba(26,115,232,0.35);
    transition: opacity 0.15s;
  }
  #launch-btn:hover { opacity: 0.88; }
  #launch-btn:disabled { opacity: 0.55; cursor: default; }
  #launch-label { font-size: 13px; color: #888; }

  /* ── Error state ── */
  #err {
    display: none;
    padding: 20px;
    color: #c62828;
    font-size: 13px;
    line-height: 1.8;
  }

  /* ── Glean renders itself into #gc — make sure children fill it ── */
  #gc > * { width: 100% !important; height: 100% !important; }
</style>
</head>
<body>

<!-- ── CONFIGURE THESE ─────────────────────────────────────────────────────── -->
<script>
  var POWER_BI_EMBED_URL = "YOUR_POWER_BI_EMBED_URL_HERE";
  // Get this from Power BI: open your report → File → Embed report → Website or portal
  // It looks like: https://app.powerbi.com/reportEmbed?reportId=...&groupId=...

  var WEB_APP_URL = "https://app.glean.com";
  var BACKEND_URL = "https://oida-be.glean.com";
  var AGENT_ID    = "";  // Optional: paste your Glean agent ID here
</script>
<!-- ─────────────────────────────────────────────────────────────────────────── -->

<!-- Header -->
<div id="header">
  <span id="header-title">Analytics Dashboard</span>
  <button id="toggle-btn" onclick="togglePanel()">
    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="1" y="3" width="14" height="1.5" rx="0.75" fill="white"/>
      <rect x="1" y="7.25" width="14" height="1.5" rx="0.75" fill="white"/>
      <rect x="1" y="11.5" width="9" height="1.5" rx="0.75" fill="white"/>
    </svg>
    Ask Glean Assistant
  </button>
</div>

<!-- Layout -->
<div id="layout">

  <!-- Power BI -->
  <div id="pbi-wrap">
    <iframe id="pbi-frame" allowfullscreen="true"
      allow="fullscreen"
      title="Power BI Dashboard">
    </iframe>
  </div>

  <!-- Glean side panel -->
  <div id="glean-panel" class="collapsed">
    <div id="panel-header">
      <span id="panel-title">Glean Assistant</span>
    </div>
    <div id="gc">
      <div id="launch-screen">
        <p>Connect to Glean to ask questions about your data and company knowledge.</p>
        <button id="launch-btn" onclick="launch()">Connect to Glean</button>
        <span id="launch-label">Sign in with your company account</span>
      </div>
      <div id="err"></div>
    </div>
  </div>

</div>

<script>
  // ── Set Power BI embed URL ────────────────────────────────────────────────
  (function () {
    var frame = document.getElementById('pbi-frame');
    if (POWER_BI_EMBED_URL && POWER_BI_EMBED_URL !== 'YOUR_POWER_BI_EMBED_URL_HERE') {
      frame.src = POWER_BI_EMBED_URL;
    } else {
      // Placeholder when no URL is configured
      frame.srcdoc = [
        '<!DOCTYPE html><html><body style="display:flex;align-items:center;justify-content:center;',
        'height:100vh;margin:0;background:#f3f6fb;font-family:Segoe UI,sans-serif;color:#666;',
        'flex-direction:column;gap:12px;">',
        '<svg width="48" height="48" viewBox="0 0 48 48" fill="none"><rect width="48" height="48" rx="8" fill="#e8edf5"/>',
        '<rect x="10" y="28" width="8" height="12" rx="2" fill="#1a73e8"/><rect x="20" y="20" width="8" height="20" rx="2" fill="#1a73e8" opacity="0.7"/>',
        '<rect x="30" y="14" width="8" height="26" rx="2" fill="#1a73e8" opacity="0.5"/></svg>',
        '<p style="font-size:15px;font-weight:600;margin:0">Power BI Dashboard</p>',
        '<p style="font-size:13px;margin:0;text-align:center;max-width:260px">',
        'Set POWER_BI_EMBED_URL in dashboard.html to load your report here.</p>',
        '</body></html>'
      ].join('');
    }
  }());

  // ── Toggle Glean panel ────────────────────────────────────────────────────
  var panelOpen = false;

  function togglePanel() {
    panelOpen = !panelOpen;
    var panel = document.getElementById('glean-panel');
    var btn = document.getElementById('toggle-btn');
    if (panelOpen) {
      panel.classList.remove('collapsed');
      btn.innerHTML = [
        '<svg width="16" height="16" viewBox="0 0 16 16" fill="none">',
        '<path d="M10 3L5 8l5 5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>',
        '</svg> Close Assistant'
      ].join('');
    } else {
      panel.classList.add('collapsed');
      btn.innerHTML = [
        '<svg width="16" height="16" viewBox="0 0 16 16" fill="none">',
        '<rect x="1" y="3" width="14" height="1.5" rx="0.75" fill="white"/>',
        '<rect x="1" y="7.25" width="14" height="1.5" rx="0.75" fill="white"/>',
        '<rect x="1" y="11.5" width="9" height="1.5" rx="0.75" fill="white"/>',
        '</svg> Ask Glean Assistant'
      ].join('');
    }
  }

  // ── Glean SDK ─────────────────────────────────────────────────────────────
  var launched = false;

  function setLabel(msg) {
    var el = document.getElementById('launch-label');
    if (el) el.textContent = msg;
  }

  function showErr(msg) {
    document.getElementById('launch-screen').style.display = 'none';
    var e = document.getElementById('err');
    e.style.display = 'block';
    e.textContent = msg;
  }

  function renderChat() {
    document.getElementById('launch-screen').style.display = 'none';
    var container = document.getElementById('gc');
    try {
      var opts = {
        webAppUrl: WEB_APP_URL,
        backend:   BACKEND_URL,
        enable3PCookieAccessRequest: true,
        customizations: {
          features: {
            chatMenu: false,
            chatSettings: false,
            createPrompt: false,
            clearChat: true,
            feedback: true,
            applicationLibrary: false,
            promptLibrary: false
          }
        }
      };
      if (AGENT_ID) { opts.agentId = AGENT_ID; }
      window.GleanWebSDK.renderChat(container, opts);
    } catch (e) {
      showErr('Glean SDK error: ' + (e && e.message ? e.message : String(e)));
    }
  }

  function loadSdkAndRender() {
    setLabel('Loading Glean SDK…');
    var script = document.createElement('script');
    script.src = 'https://app.glean.com/embedded-search-latest.min.js';

    var timeout = setTimeout(function () {
      showErr('Glean SDK did not load within 15 s. Check network access to https://app.glean.com.');
    }, 15000);

    window.addEventListener('glean:ready', function () {
      clearTimeout(timeout);
      setLabel('Connecting…');
      renderChat();
    }, { once: true });

    script.onload = function () {
      if (window.GleanWebSDK) {
        clearTimeout(timeout);
        setTimeout(function () {
          if (window.GleanWebSDK && document.getElementById('launch-screen') &&
              document.getElementById('launch-screen').style.display !== 'none') {
            renderChat();
          }
        }, 500);
      }
    };

    script.onerror = function () {
      clearTimeout(timeout);
      showErr('Could not load the Glean SDK. Check your network connection to https://app.glean.com.');
    };

    document.head.appendChild(script);
  }

  function launch() {
    if (launched) return;
    launched = true;
    var btn = document.getElementById('launch-btn');
    btn.disabled = true;
    setLabel('Requesting access…');

    var req = document.requestStorageAccess
      ? document.requestStorageAccess()
      : Promise.resolve();

    req
      .catch(function () { /* denied — proceed anyway */ })
      .finally(function () { loadSdkAndRender(); });
  }
</script>

</body>
</html>
